spring.application.name=currency-service
server.port=8100

spring.datasource.url=jdbc:postgresql://localhost/db_currency
spring.datasource.username=postgres
spring.datasource.password=postgres

spring.jpa.hibernate.ddl-auto=none

spring.jpa.show-sql=true

spring.flyway.locations=classpath:db_migration

#Self registration pattern
eureka.client.service-url.default-zone=http://localhost:8761/eureka
#Ideal para ambientes conteinerizados
eureka.instance.prefer-ip-address=true
#Personaliza’┐Į’┐Įo de ID de cada instancia
eureka.instance.instance-id=${spring.application.name}:${server.port}
#Indicar que o Service Registry deve validar a sa’┐Įde do servi’┐Įo atravez do actuator, e n’┐Įo somente Heartbeat
#OPCIONAL - valor Default = True
eureka.client.healthcheck.enabled=true

#Configura’┐Į’┐Įo minima para atua’┐Į’┐Įo com o Service Registry de forma consciente
management.endpoints.web.exposure.include=health,info,metrics,circuit-breakers,circuit-breaker-events
#ATEN’┐Į’┐ĮO: Cuidado ao expor esses dados
#Exibir informa’┐Į’┐Įes de sa’┐Įde da app
management.endpoint.health.show-details=always
#Exibir informa’┐Į’┐Įes no endpoint /actuator/info
management.info.env.enabled=true

#personaliza’┐Į’┐Įo de informa’┐Į’┐Įes do endpoint /actuator/info
info.app.name=${spring.application.name}
info.app.description=Microservice Java 2026
info.app.autor=Guilherme Tadeu Castellani
#personaliza’┐Į’┐Įo de Metadatas
eureka.instance.metadata-map.github.repo=GuilhermeTCastellani/microservices-java

#Definir a utiliza’┐Į’┐Įo das Probes Livenesse Readdiness + exibi’┐Į’┐Įo de informa’┐Į’┐Įes e componentes diversos (DEFAULT = opcional)
management.endpoint.health.probes.enabled=true
management.health.defaults.enabled=true

# RESILIENCE PATTERN - CIRCUIT BREAKER (habilita OpenFeign + CB)
spring.cloud.openfeign.circuitbreaker.enabled=true
spring.cloud.openfeign.circuitbreaker.group.enabled=true

# RESILIENCE PATTERN - TIMEOUT
spring.cloud.openfeign.client.config.bcb-client.connect-timeout=1000
spring.cloud.openfeign.client.config.bcb-client.read-timeout=3000

# RESILIENCE PATTERN - RETRY
resilience4j.retry.instances.bcb-client.max-attempts=3
resilience4j.retry.instances.bcb-client.wait-duration=500ms
resilience4j.retry.instances.bcb-client.enable-exponential-backoff=true
resilience4j.retry.instances.bcb-client.exponential-backoff-multiplier=2.0
resilience4j.retry.instances.bcb-client.enable-randomized-wait=true
resilience4j.retry.instances.bcb-client.randomized-wait-factor=0.5
resilience4j.retry.instances.bcb-client.ignore-exceptions[0]=feign.FeignException$FeignClientException

# RESILIENCE PATTERN - CACHE (Caffeine)
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=500,expireAfterWrite=15s

# RESILIENCE PATTERN - CIRCUIT BREAKER (configuracao da instancia)
resilience4j.circuitbreaker.instances.bcb-client.register-health-indicator=true
resilience4j.circuitbreaker.instances.bcb-client.sliding-window-size=10
resilience4j.circuitbreaker.instances.bcb-client.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.bcb-client.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.bcb-client.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.bcb-client.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.bcb-client.automatic-transition-from-open-to-half-open-enabled=true

management.health.circuitbreakers.enabled=true